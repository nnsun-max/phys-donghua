<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>示波管结构 - 3D电子枪与偏转系统 | 射线检测悬停说明（含偏转板及屏幕）</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        .title {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 40px;
            z-index: 250;
            pointer-events: none;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .control-panel {
            position: absolute;
            top: 100px;
            left: 20px;
            width: 300px;
            background: rgba(20, 20, 40, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 16px;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 200;
            font-size: 12px;
            pointer-events: auto;
            user-select: none;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid #3a86ff;
            padding-bottom: 6px;
        }
        .panel-header h3 { margin: 0; font-size: 16px; }
        .control-group { margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 8px; }
        .control-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 11px; color: #ddd; }
        select, input { width: 100%; background: #2a2a3a; border: 1px solid #5a6e9a; color: white; padding: 5px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .param-row { display: flex; gap: 8px; margin-top: 6px; }
        .param-row > div { flex: 1; }
        .badge { background: #3a86ff; border-radius: 10px; padding: 2px 8px; font-size: 9px; margin-top: 4px; display: inline-block; }
        button { background: #3a86ff; border: none; padding: 6px 12px; border-radius: 20px; color: white; cursor: pointer; font-size: 11px; width: 100%; margin-top: 8px; }
        button:hover { background: #2666cc; }
        .value-display { font-size: 10px; color: #aaa; text-align: right; margin-top: 2px; }
        .note { font-size: 10px; text-align: center; margin-top: 10px; color: #88aaff; }
        .sync-note {
            font-size: 10px;
            text-align: center;
            margin-top: 8px;
            color: #ffaa66;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 4px;
        }
        .axis-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            z-index: 300;
            pointer-events: none;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        canvas.axis-canvas { display: block; width: 100%; height: 100%; }
        .custom-tooltip {
            position: absolute;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: #ffdd99;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            max-width: 280px;
            border-left: 3px solid #ffaa66;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            line-height: 1.4;
            transition: opacity 0.1s;
        }
        @media (max-width: 700px) {
            .control-panel { width: 260px; left: 10px; top: 90px; padding: 12px; }
            .axis-container { width: 110px; height: 110px; bottom: 10px; right: 10px; }
            .title { font-size: 20px; top: 12px; padding: 4px 16px; }
        }
    </style>
</head>
<body>
    <div class="title">示波管结构</div>
    <div id="control-panel" class="control-panel">
        <div class="panel-header"><h3>⚡ 偏转系统控制</h3></div>
        <div class="control-group">
            <label>🎛️ 电子速度 (0=静止 → 10.0)</label>
            <input type="range" id="electron-speed" min="0" max="10.0" step="0.05" value="1.5">
            <div class="value-display" id="speed-val">1.50</div>
        </div>
        <div class="control-group">
            <label>🟡 X偏转板 (水平偏转 / 左右)</label>
            <select id="x-waveform"><option value="sin">正弦波</option><option value="tri">三角波</option><option value="saw">锯齿波</option><option value="square">方波</option></select>
            <div class="param-row">
                <div><label>频率(Hz)</label><input type="range" id="x-freq" min="0" max="10" step="0.5" value="2.0"><span id="x-freq-val" class="badge">2.0</span></div>
                <div><label>电压(V)</label><input type="range" id="x-volt" min="0" max="2.5" step="0.5" value="1.2"><span id="x-volt-val" class="badge">1.2</span></div>
            </div>
            <div><label>初相位(°)</label><input type="range" id="x-phase" min="0" max="360" step="5" value="0"><span id="x-phase-val" class="badge">0°</span></div>
        </div>
        <div class="control-group">
            <label>🔵 Y偏转板 (垂直偏转 / 上下)</label>
            <select id="y-waveform"><option value="sin">正弦波</option><option value="tri">三角波</option><option value="saw">锯齿波</option><option value="square">方波</option></select>
            <div class="param-row">
                <div><label>频率(Hz)</label><input type="range" id="y-freq" min="0" max="10" step="0.5" value="1.5"><span id="y-freq-val" class="badge">1.5</span></div>
                <div><label>电压(V)</label><input type="range" id="y-volt" min="0" max="2.5" step="0.5" value="1.0"><span id="y-volt-val" class="badge">1.0</span></div>
            </div>
            <div><label>初相位(°)</label><input type="range" id="y-phase" min="0" max="360" step="5" value="45"><span id="y-phase-val" class="badge">45°</span></div>
        </div>
        <button id="reset-screen-btn">🧹 清除荧光屏轨迹</button>
        <div class="sync-note">若想得到稳定信号，X和Y的频率要满足成整数比关系。这就是“同步作用”。</div>
        <div class="note">💡 鼠标划过电极模型（阴极/栅极/阳极/偏转板/荧光屏）可显示说明</div>
    </div>

    <div class="axis-container" id="axis-container"><canvas id="axis-canvas" class="axis-canvas"></canvas></div>
    <div id="tooltip" class="custom-tooltip" style="display: none;"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        function getWaveValue(type, t, freq, phaseDeg, amp) {
            if (freq === 0) return Math.sin(phaseDeg * Math.PI/180) * amp;
            let arg = 2 * Math.PI * freq * t + phaseDeg * Math.PI/180;
            switch(type) {
                case 'sin': return Math.sin(arg) * amp;
                case 'tri': return (2 * Math.abs(2 * ((arg/(2*Math.PI)) % 1) - 1) - 1) * amp;
                case 'saw': return (2 * ((arg/(2*Math.PI)) % 1) - 1) * amp;
                case 'square': return (Math.sin(arg) >= 0 ? 1 : -1) * amp;
                default: return Math.sin(arg) * amp;
            }
        }

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050a16);
        scene.fog = new THREE.FogExp2(0x050a16, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(7, 5, 9);
        camera.lookAt(3, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.enablePan = true;
        controls.target.set(3, 0, 0);
        
        // 灯光
        const ambient = new THREE.AmbientLight(0x404080);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(4, 8, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x88aaff, 0.6);
        fillLight.position.set(0, 2, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa77, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const rimLight = new THREE.PointLight(0xff8866, 0.5);
        rimLight.position.set(3, 2, 4);
        scene.add(rimLight);
        
        const gridHelper = new THREE.GridHelper(20, 24, 0x3399ff, 0x224466);
        gridHelper.position.y = -1.8;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);
        
        // 星空
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < 1500; i++) {
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 100);
            starPos.push((Math.random() - 0.5) * 80 - 40);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xaaccff, size: 0.07, transparent: true }));
        scene.add(stars);
        
        // 玻璃外壳
        const glassGroup = new THREE.Group();
        const tubeBody = new THREE.Mesh(
            new THREE.CylinderGeometry(2.7, 2.7, 13.5, 64),
            new THREE.MeshPhysicalMaterial({ color: 0xaaddff, metalness: 0.05, roughness: 0.2, transparent: true, opacity: 0.25, side: THREE.DoubleSide })
        );
        tubeBody.rotation.z = Math.PI/2;
        tubeBody.position.set(2.5, 0, 0);
        glassGroup.add(tubeBody);
        const flare = new THREE.Mesh(
            new THREE.ConeGeometry(3.2, 2.4, 64),
            new THREE.MeshPhysicalMaterial({ color: 0xaaddff, transparent: true, opacity: 0.28, side: THREE.DoubleSide })
        );
        flare.rotation.z = Math.PI/2;
        flare.position.set(8.2, 0, 0);
        glassGroup.add(flare);
        const neck = new THREE.Mesh(
            new THREE.CylinderGeometry(1.5, 1.7, 2.0, 48),
            new THREE.MeshPhysicalMaterial({ color: 0xaaddff, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
        );
        neck.rotation.z = Math.PI/2;
        neck.position.set(-2.8, 0, 0);
        glassGroup.add(neck);
        scene.add(glassGroup);
        
        // 内部电极组 (单独分组用于射线检测)
        const internals = new THREE.Group();
        
        // 灯丝 (螺旋)
        const filamentGroup = new THREE.Group();
        const filamentMat = new THREE.MeshStandardMaterial({ color: 0xff5555, emissive: 0xff2222, emissiveIntensity: 0.85 });
        for (let i = 0; i <= 28; i++) {
            const t = i / 28;
            const angle = t * Math.PI * 6.5;
            const x = -2.6 + t * 0.68;
            const y = Math.cos(angle) * 0.12;
            const z = Math.sin(angle) * 0.12;
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 8), filamentMat);
            sphere.position.set(x, y, z);
            filamentGroup.add(sphere);
        }
        internals.add(filamentGroup);
        
        // 阴极 (深灰圆筒)
        const cathodeMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.4, roughness: 0.6 });
        const cathodeCyl = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.95, 32), cathodeMat);
        cathodeCyl.rotation.z = Math.PI/2;
        cathodeCyl.position.set(-1.95, 0, 0);
        internals.add(cathodeCyl);
        const cathodeCap = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.08, 24), cathodeMat);
        cathodeCap.rotation.z = Math.PI/2;
        cathodeCap.position.set(-2.42, 0, 0);
        internals.add(cathodeCap);
        
        // 栅极 (半透银)
        const gridMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.75, roughness: 0.3, transparent: true, opacity: 0.6 });
        const gridCyl = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 1.25, 48), gridMat);
        gridCyl.rotation.z = Math.PI/2;
        gridCyl.position.set(-1.15, 0, 0);
        internals.add(gridCyl);
        const gridFront = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 0.08, 32), new THREE.MeshStandardMaterial({ color: 0xd0d0d0, metalness: 0.8 }));
        gridFront.rotation.z = Math.PI/2;
        gridFront.position.set(-0.53, 0, 0);
        internals.add(gridFront);
        
        // 第一阳极 (亮银圆盘)
        const anode1Mat = new THREE.MeshStandardMaterial({ color: 0xd8d8d8, metalness: 0.7, roughness: 0.35 });
        const anode1Disc = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.25, 48), anode1Mat);
        anode1Disc.rotation.z = Math.PI/2;
        anode1Disc.position.set(0.2, 0, 0);
        internals.add(anode1Disc);
        
        // 第二阳极 (中灰长筒)
        const anode2Mat = new THREE.MeshStandardMaterial({ color: 0xb0b0b0, metalness: 0.72, roughness: 0.4 });
        const anode2Cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.52, 1.85, 48), anode2Mat);
        anode2Cyl.rotation.z = Math.PI/2;
        anode2Cyl.position.set(1.4, 0, 0);
        internals.add(anode2Cyl);
        
        // 偏转板 (青绿色正方形)
        const plateMat = new THREE.MeshStandardMaterial({ color: 0x66eebb, metalness: 0.65, roughness: 0.3, emissive: 0x226644 });
        const plateSize = 1.45;
        const gap = 0.95;
        const yTop = new THREE.Mesh(new THREE.BoxGeometry(plateSize, 0.12, plateSize), plateMat);
        yTop.position.set(3.5, gap, 0);
        const yBottom = new THREE.Mesh(new THREE.BoxGeometry(plateSize, 0.12, plateSize), plateMat);
        yBottom.position.set(3.5, -gap, 0);
        internals.add(yTop, yBottom);
        const xLeft = new THREE.Mesh(new THREE.BoxGeometry(plateSize, plateSize, 0.12), plateMat);
        xLeft.position.set(5.5, 0, -gap);
        const xRight = new THREE.Mesh(new THREE.BoxGeometry(plateSize, plateSize, 0.12), plateMat);
        xRight.position.set(5.5, 0, gap);
        internals.add(xLeft, xRight);
        
        scene.add(internals);
        
        // 荧光屏 (正方形)
        const screenTexture = document.createElement('canvas');
        screenTexture.width = 1024;
        screenTexture.height = 1024;
        const ctxScreen = screenTexture.getContext('2d');
        ctxScreen.fillStyle = '#002211';
        ctxScreen.fillRect(0, 0, screenTexture.width, screenTexture.height);
        const screenMat = new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(screenTexture), emissive: 0x008844, emissiveIntensity: 0.5, side: THREE.DoubleSide });
        const screenPlane = new THREE.Mesh(new THREE.PlaneGeometry(2.9, 2.9), screenMat);
        screenPlane.position.set(8.8, 0, 0);
        screenPlane.rotation.y = Math.PI / 2;
        scene.add(screenPlane);
        
        // 电子球
        const electronMatObj = new THREE.MeshStandardMaterial({ color: 0x44ff66, emissive: 0x22aa44, emissiveIntensity: 0.95 });
        const electron = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), electronMatObj);
        scene.add(electron);
        
        // --- 文字标签 (仅用于视觉，不参与交互) ---
        function makeLabel(text, pos, color) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 10px';
            div.style.borderRadius = '20px';
            div.style.fontSize = '12px';
            div.style.fontWeight = 'bold';
            div.style.borderLeft = `3px solid ${color}`;
            div.style.pointerEvents = 'none';
            const label = new CSS2DObject(div);
            label.position.copy(pos);
            scene.add(label);
        }
        const labelY = 2.4;
        makeLabel('灯丝', new THREE.Vector3(-2.4, labelY, 0), '#ff8888');
        makeLabel('阴极', new THREE.Vector3(-1.8, labelY, 0), '#aaaaaa');
        makeLabel('栅极', new THREE.Vector3(-1.0, labelY, 0), '#c8c8c8');
        makeLabel('第一阳极', new THREE.Vector3(0.2, labelY, 0), '#d0d0d0');
        makeLabel('第二阳极', new THREE.Vector3(1.4, labelY, 0), '#bbbbbb');
        makeLabel('Y偏转板', new THREE.Vector3(3.5, labelY, 0), '#66eebb');
        makeLabel('X偏转板', new THREE.Vector3(5.5, labelY, 0), '#66eebb');
        makeLabel('荧光屏', new THREE.Vector3(8.8, labelY, 0), '#88ffaa');
        
        // --- 射线检测悬停提示 (基于模型部件，包含偏转板和荧光屏) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const interactiveParts = [
            { name: '阴极', obj: cathodeCyl, tip: '阴极是一个表面涂有氧化层的金属圆筒，灯丝通电加热后发射电子。' },
            { name: '栅极', obj: gridCyl, tip: '控制栅极是一个顶端有小孔的圆筒，套在阴极外面，它的电位比阴极稍低，对阴极发出来的电子起控制作用，只有初速度比较大的电子才能穿过栅极顶端的小孔，然后在阳极的加速下射向荧光屏，对应面板上的“亮度”旋钮。' },
            { name: '第一阳极', obj: anode1Disc, tip: '又名聚焦阳极，阳极电位比阴极电位高很多，电子枪内的电场对电子射线有聚焦作用，对应面板上的“聚焦”旋钮。' },
            { name: '第二阳极', obj: anode2Cyl, tip: '又名加速阳极，比第一阳极电位更高，对应面板上的“辅助聚焦”旋钮。' },
            { name: 'Y偏转板', obj: yTop, tip: 'Y偏转板两端加上电压信号，电子经过Y偏转板会在电场作用下上下偏转。' },
            { name: 'X偏转板', obj: xLeft, tip: 'X偏转板加上电压信号，电子经过X偏转板会在电场作用下左右偏转。' },
            { name: '荧光屏', obj: screenPlane, tip: '最终打到荧光屏上的图形是Y偏转板上的信号与X偏转板上的信号的合成，即两个振动在垂直方向的合成。' }
        ];
        
        const tooltipDiv = document.getElementById('tooltip');
        let currentHovered = null;
        
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const objects = interactiveParts.map(p => p.obj);
            const intersects = raycaster.intersectObjects(objects);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const part = interactiveParts.find(p => p.obj === hit);
                if (part && currentHovered !== part.name) {
                    currentHovered = part.name;
                    tooltipDiv.style.display = 'block';
                    tooltipDiv.innerHTML = part.tip;
                    tooltipDiv.style.left = (event.clientX + 15) + 'px';
                    tooltipDiv.style.top = (event.clientY - 10) + 'px';
                } else if (part) {
                    tooltipDiv.style.left = (event.clientX + 15) + 'px';
                    tooltipDiv.style.top = (event.clientY - 10) + 'px';
                }
            } else {
                if (currentHovered !== null) {
                    currentHovered = null;
                    tooltipDiv.style.display = 'none';
                }
            }
        });
        
        // 屏幕绘制 (仅点)
        function drawOnScreen(sx, sy) {
            const cx = (sx * 0.92 + 1) / 2 * screenTexture.width;
            const cy = (1 - (sy * 0.9 + 1) / 2) * screenTexture.height;
            ctxScreen.beginPath();
            ctxScreen.arc(cx, cy, 5, 0, 2*Math.PI);
            ctxScreen.fillStyle = `rgba(0, 255, 200, 0.98)`;
            ctxScreen.fill();
            screenMat.map.needsUpdate = true;
        }
        document.getElementById('reset-screen-btn').addEventListener('click', () => {
            ctxScreen.fillStyle = '#002211';
            ctxScreen.fillRect(0, 0, screenTexture.width, screenTexture.height);
            screenMat.map.needsUpdate = true;
        });
        
        // 电子运动逻辑
        let progress = 0, globalT = 0;
        const CATH_X = -2.2, Y_START = 3.3, X_START = 5.3, SCR_X = 8.6;
        function updateElectron(delta) {
            const speed = parseFloat(document.getElementById('electron-speed').value);
            document.getElementById('speed-val').innerText = speed.toFixed(2);
            if (speed === 0) {
                globalT += delta * 0.7;
                electron.material.emissiveIntensity = 0.7;
                return;
            }
            progress += delta * speed * 0.85;
            globalT += delta * 0.72;
            if (progress >= 1.0) {
                progress = 0;
                const xVolt = getWaveValue(document.getElementById('x-waveform').value, globalT, parseFloat(document.getElementById('x-freq').value), parseFloat(document.getElementById('x-phase').value), parseFloat(document.getElementById('x-volt').value));
                const yVolt = getWaveValue(document.getElementById('y-waveform').value, globalT, parseFloat(document.getElementById('y-freq').value), parseFloat(document.getElementById('y-phase').value), parseFloat(document.getElementById('y-volt').value));
                drawOnScreen(xVolt * 0.74, yVolt * 0.74);
            }
            const x = CATH_X + progress * (SCR_X - CATH_X);
            const xVolt = getWaveValue(document.getElementById('x-waveform').value, globalT, parseFloat(document.getElementById('x-freq').value), parseFloat(document.getElementById('x-phase').value), parseFloat(document.getElementById('x-volt').value));
            const yVolt = getWaveValue(document.getElementById('y-waveform').value, globalT, parseFloat(document.getElementById('y-freq').value), parseFloat(document.getElementById('y-phase').value), parseFloat(document.getElementById('y-volt').value));
            let yOff = 0, zOff = 0;
            if (x > Y_START) yOff = yVolt * 0.68 * Math.min(1, (x - Y_START) / 0.65);
            if (x > X_START) zOff = xVolt * 0.72 * Math.min(1, (x - X_START) / 0.65);
            electron.position.set(x, yOff, zOff);
            electron.material.emissiveIntensity = 0.7 + speed * 0.12;
        }
        
        // UI 绑定
        const ids = ['x-freq','x-volt','x-phase','y-freq','y-volt','y-phase'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', () => document.getElementById(`${id}-val`).innerText = el.value);
        });
        
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            const delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            updateElectron(delta);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        // 3D坐标轴指示器
        const axisContainer = document.getElementById('axis-container');
        const axisCanvas = document.getElementById('axis-canvas');
        const axisScene2 = new THREE.Scene();
        const bgSphere2 = new THREE.Mesh(new THREE.SphereGeometry(0.72, 32, 32), new THREE.MeshStandardMaterial({ color: 0x2266aa, emissive: 0x113355, transparent: true, opacity: 0.1 }));
        axisScene2.add(bgSphere2);
        const aLen = 0.55;
        axisScene2.add(new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), aLen, 0xff6666, 0.2, 0.1));
        axisScene2.add(new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), aLen, 0x66ff66, 0.2, 0.1));
        axisScene2.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,0), aLen, 0x66aaff, 0.2, 0.1));
        function makeAxisSprite(txt, col, pos) {
            const c = document.createElement('canvas');
            c.width = 48; c.height = 48;
            const ctx = c.getContext('2d');
            ctx.fillStyle = col;
            ctx.font = 'Bold 26px "Segoe UI"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(txt, 24, 24);
            const tex = new THREE.CanvasTexture(c);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false }));
            sprite.scale.set(0.24, 0.24, 1);
            sprite.position.copy(pos);
            return sprite;
        }
        axisScene2.add(makeAxisSprite('X','#ff8888', new THREE.Vector3(0.72,0,0)));
        axisScene2.add(makeAxisSprite('Y','#88ff88', new THREE.Vector3(0,0.72,0)));
        axisScene2.add(makeAxisSprite('Z','#88aaff', new THREE.Vector3(0,0,0.72)));
        const axisCamera2 = new THREE.PerspectiveCamera(45, 1, 0.1, 8);
        function updateAxisCam() {
            const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            axisCamera2.position.copy(fwd.multiplyScalar(-1.95));
            axisCamera2.quaternion.copy(camera.quaternion);
        }
        const axisRenderer2 = new THREE.WebGLRenderer({ canvas: axisCanvas, alpha: true });
        axisRenderer2.setClearColor(0,0);
        function resizeAxis() {
            const w = axisContainer.clientWidth, h = axisContainer.clientHeight;
            axisCanvas.width = w; axisCanvas.height = h;
            axisRenderer2.setSize(w, h);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            resizeAxis();
        });
        resizeAxis();
        function animateAxis() {
            updateAxisCam();
            axisRenderer2.render(axisScene2, axisCamera2);
            requestAnimationFrame(animateAxis);
        }
        animateAxis();
        
        console.log('射线检测悬停提示已启用，包含阴极、栅极、第一/第二阳极、Y/X偏转板及荧光屏，并已添加同步说明');
    </script>
</body>
</html>
